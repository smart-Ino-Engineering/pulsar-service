networks:
  pulsar:
    driver: bridge

services:
  # Start zookeeper
  zookeeper:
    image: apachepulsar/pulsar:latest
    container_name: zookeeper
    restart: unless-stopped
    networks:
      - pulsar
    volumes:
      - ./data/zookeeper:/pulsar/data/zookeeper
    environment:
      - metadataStoreUrl=zk:zookeeper:2181
      # ⬇️ MASSIVE MEMORY REDUCTION
      - PULSAR_MEM=-Xms128m -Xmx128m -XX:MaxDirectMemorySize=64m
    command:
      - bash
      - -c
      - |
        mkdir -p /pulsar/data/zookeeper/version-2
        chown -R pulsar:pulsar /pulsar/data/zookeeper || true
        chmod -R 755 /pulsar/data/zookeeper || true
        bin/apply-config-from-env.py conf/zookeeper.conf && \
        bin/generate-zookeeper-config.sh conf/zookeeper.conf && \
        exec bin/pulsar zookeeper
    healthcheck:
      test: ["CMD", "bin/pulsar-zookeeper-ruok.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Init cluster metadata
  pulsar-init:
    container_name: pulsar-init
    hostname: pulsar-init
    image: apachepulsar/pulsar:latest
    networks:
      - pulsar
    environment:
      # ⬇️ Prevent the init script from spiking RAM
      - PULSAR_MEM=-Xms128m -Xmx128m -XX:MaxDirectMemorySize=64m
    command:
      - bash
      - -c
      - |
        bin/pulsar initialize-cluster-metadata \
        --cluster cluster-a \
        --zookeeper zookeeper:2181 \
        --configuration-store zookeeper:2181 \
        --web-service-url http://broker:8080 \
        --broker-service-url pulsar://broker:6650
    depends_on:
      zookeeper:
        condition: service_healthy

  # Start bookie
  bookie:
    image: apachepulsar/pulsar:latest
    container_name: bookie
    restart: unless-stopped
    networks:
      - pulsar
    environment:
      - clusterName=${PULSAR_CLUSTER_NAME:-cluster-a}
      - zkServers=zookeeper:2181
      - metadataServiceUri=metadata-store:zk:zookeeper:2181
      - advertisedAddress=bookie
      # ⬇️ MASSIVE MEMORY REDUCTION
      - BOOKIE_MEM=-Xms256m -Xmx256m -XX:MaxDirectMemorySize=128m
    depends_on:
      zookeeper:
        condition: service_healthy
      pulsar-init:
        condition: service_completed_successfully
    volumes:
      - ./data/bookkeeper:/pulsar/data/bookkeeper
    command:
      - bash
      - -c
      - |
        mkdir -p /pulsar/data/bookkeeper
        chown -R pulsar:pulsar /pulsar/data/bookkeeper || true
        chmod -R 755 /pulsar/data/bookkeeper || true
        bin/apply-config-from-env.py conf/bookkeeper.conf && exec bin/pulsar bookie
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
# Start broker
  broker:
    image: apachepulsar/pulsar:latest
    container_name: broker
    hostname: broker
    restart: unless-stopped
    networks:
      - pulsar
    environment:
      - metadataStoreUrl=zk:zookeeper:2181
      - zookeeperServers=zookeeper:2181
      - clusterName=${PULSAR_CLUSTER_NAME:-cluster-a}
      - managedLedgerDefaultEnsembleSize=1
      - managedLedgerDefaultWriteQuorum=1
      - managedLedgerDefaultAckQuorum=1
      
      - advertisedAddress=broker
      - advertisedListeners=internal:pulsar://broker:6650,external:pulsar://109.205.180.118:6651
      - internalListenerName=internal
      
      # FIX: Define the internal service port alongside the explicit bindings
      - brokerServicePort=6650
      - bindAddresses=internal:pulsar://0.0.0.0:6650,external:pulsar://0.0.0.0:6651
      
      - PULSAR_MEM=-Xms384m -Xmx384m -XX:MaxDirectMemorySize=256m
    depends_on:
      zookeeper:
        condition: service_healthy
      bookie:
        condition: service_started
    ports:
      - "6650:6650"
      - "6651:6651"
      - "8085:8080"
    command: bash -c "bin/apply-config-from-env.py conf/broker.conf && exec bin/pulsar broker"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"